<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="LIFT-FLOW Programming — Entrenamiento personalizado. Gym · Halterofilia · CrossFit">
<meta property="og:title" content="LIFT-FLOW Programming">
<meta property="og:description" content="No solo entrenamos. Construimos una forma de vida.">
<meta property="og:type" content="website">
<title>LIFT-FLOW Programming</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#e63030; --red-dim:rgba(230,48,48,.15); --red-border:rgba(230,48,48,.4);
    --black:#0a0a0a; --dark:#111111; --card:#0e0e0e; --border:#1e1e1e;
    --white:#f0f0f0; --gray:#888888; --gray-dim:#444444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#111}
  ::-webkit-scrollbar-thumb{background:var(--red)}
  body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* HERO */
  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden;text-align:center}
  .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(230,48,48,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(230,48,48,.08) 0%,transparent 50%),var(--black);pointer-events:none}
  .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(230,48,48,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(230,48,48,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
  .logo-wrap{display:inline-block;margin-bottom:28px;animation:fadeUp .6s ease forwards}
  .logo-wrap img{width:220px;display:block;opacity:.95}
  .hero-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:5px;color:var(--red);font-weight:700;text-transform:uppercase;margin-bottom:10px;animation:fadeUp .6s .1s ease both}
  .hero-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(42px,10vw,80px);font-weight:900;text-transform:uppercase;line-height:.95;letter-spacing:-1px;margin-bottom:16px;animation:fadeUp .6s .2s ease both}
  .hero-title span{color:var(--red)}
  .hero-sub{font-size:16px;color:var(--gray);font-weight:300;max-width:480px;line-height:1.6;margin-bottom:40px;animation:fadeUp .6s .3s ease both}
  .hero-cta{background:var(--red);color:#fff;border:none;padding:16px 40px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s;animation:fadeUp .6s .4s ease both;text-decoration:none;display:inline-block;margin:6px}
  .hero-cta:hover{background:#c42020;transform:translateY(-2px)}
  .hero-cta.outline{background:transparent;border:1px solid var(--red-border);color:var(--red)}
  .hero-cta.outline:hover{background:var(--red-dim)}

  /* MANIFESTO */
  .manifesto{padding:80px 20px;position:relative;overflow:hidden;border-top:1px solid var(--border)}
  .manifesto-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(230,48,48,.07) 0%,transparent 70%);pointer-events:none}
  .manifesto-inner{max-width:780px;margin:0 auto;position:relative}
  .manifesto-quote{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:900;text-transform:uppercase;line-height:1.05;letter-spacing:.5px;margin-bottom:32px}
  .manifesto-quote em{color:var(--red);font-style:normal}
  .manifesto-text{font-size:16px;color:var(--gray);line-height:1.8;font-weight:300;max-width:640px;margin-bottom:40px}
  .manifesto-text strong{color:var(--white);font-weight:600}
  .manifesto-pills{display:flex;flex-wrap:wrap;gap:10px}
  .m-pill{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;font-weight:700;padding:6px 14px;text-transform:uppercase}

  /* SECTION */
  .section{padding:60px 20px;max-width:780px;margin:0 auto}
  .section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:4px;color:var(--red);font-weight:700;text-transform:uppercase;margin-bottom:8px}
  .section-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,6vw,44px);font-weight:900;text-transform:uppercase;line-height:1;margin-bottom:8px}
  .section-sub{font-size:14px;color:var(--gray);margin-bottom:36px;font-weight:300;line-height:1.6}

  /* TRAINING CARDS */
  .training-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:48px}
  .training-card{border:1px solid var(--border);background:var(--card);padding:28px 20px;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden}
  .training-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);transform:scaleX(0);transition:transform .25s}
  .training-card:hover::before,.training-card.selected::before{transform:scaleX(1)}
  .training-card:hover{border-color:var(--red-border);background:rgba(230,48,48,.05);transform:translateY(-3px)}
  .training-card.selected{border-color:var(--red);background:rgba(230,48,48,.08)}
  .card-icon{font-size:32px;margin-bottom:12px;display:block}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .card-desc{font-size:12px;color:var(--gray);line-height:1.5;font-weight:300}
  .card-check{position:absolute;top:10px;right:10px;width:20px;height:20px;background:var(--red);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .training-card.selected .card-check{display:flex}

  /* FORM */
  .form-wrap{display:none;animation:fadeUp .4s ease forwards}
  .form-wrap.visible{display:block}
  .form-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
  .form-badge{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;font-weight:700;padding:4px 10px;text-transform:uppercase}
  .form-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group.full{grid-column:1/-1}
  .form-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:var(--red);font-weight:700;text-transform:uppercase}
  .form-input,.form-select,.form-textarea{background:var(--dark);border:1px solid var(--border);color:var(--white);font-size:14px;padding:11px 14px;font-family:'Barlow',sans-serif;width:100%;transition:border-color .2s;outline:none;-webkit-appearance:none}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--red)}
  .form-textarea{resize:vertical;min-height:90px;line-height:1.5}
  .form-input::placeholder,.form-textarea::placeholder{color:var(--gray-dim)}
  .checkbox-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .checkbox-item{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;border:1px solid var(--border);background:var(--dark);transition:all .2s}
  .checkbox-item:hover{border-color:var(--red-border)}
  .checkbox-item input{display:none}
  .checkbox-item input:checked + .cb-box{background:var(--red);border-color:var(--red)}
  .cb-box{width:16px;height:16px;border:1px solid var(--gray-dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s}
  .cb-label{font-size:13px;color:var(--gray);font-weight:400;line-height:1.3;transition:color .2s}
  .checkbox-item:has(input:checked){border-color:var(--red-border);background:rgba(230,48,48,.06)}
  .form-submit{width:100%;background:var(--red);color:#fff;border:none;padding:16px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:20px}
  .form-submit:hover{background:#c42020}
  .form-submit:disabled{background:var(--gray-dim);cursor:not-allowed}
  .success-msg{display:none;text-align:center;padding:40px 20px;border:1px solid var(--red-border);background:rgba(230,48,48,.06);animation:fadeIn .4s ease forwards}
  .success-msg.visible{display:block}
  .success-icon{font-size:48px;margin-bottom:16px}
  .success-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;color:var(--red);margin-bottom:8px}
  .success-text{font-size:14px;color:var(--gray);line-height:1.6}
  .rest-badge{display:inline-block;background:rgba(230,48,48,.1);border:1px solid rgba(230,48,48,.3);color:var(--red);font-size:10px;padding:3px 8px;letter-spacing:1px;font-weight:700;margin:6px 0;font-family:'Barlow Condensed',sans-serif}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}

  /* PLANES */
  .planes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
  .plan-card{border:1px solid var(--border);background:var(--card);padding:28px 20px;position:relative;transition:all .25s;display:flex;flex-direction:column}
  .plan-card.featured{border-color:var(--red);background:rgba(230,48,48,.06)}
  .plan-card.featured::before{content:'MÁS POPULAR';position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;font-weight:700;padding:3px 12px;white-space:nowrap}
  .plan-card:hover{border-color:var(--red-border);transform:translateY(-4px)}
  .plan-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;color:var(--red);font-weight:700;text-transform:uppercase;margin-bottom:8px}
  .plan-price{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;line-height:1;margin-bottom:4px}
  .plan-price span{font-size:16px;color:var(--gray);font-weight:400}
  .plan-period{font-size:12px;color:var(--gray);margin-bottom:20px}
  .plan-features{list-style:none;margin-bottom:24px;flex:1}
  .plan-features li{font-size:13px;color:var(--gray);padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;line-height:1.4}
  .plan-features li:last-child{border-bottom:none}
  .plan-features li::before{content:'✓';color:var(--red);font-weight:700;flex-shrink:0;margin-top:1px}
  .plan-btn{display:block;width:100%;padding:13px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:all .2s;border:1px solid var(--red);color:var(--red);background:transparent}
  .plan-card.featured .plan-btn{background:var(--red);color:#fff}
  .plan-btn:hover{background:var(--red);color:#fff}

  .divider{height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);margin:0 20px;opacity:.4}

  @media(max-width:640px){
    .training-grid,.planes-grid{grid-template-columns:1fr}
    .form-grid{grid-template-columns:1fr}
    .form-group.full{grid-column:1}
    .checkbox-group{grid-template-columns:1fr}
    .hero-title{font-size:48px}
    .manifesto-quote{font-size:32px}
  }
</style>
</head>
